version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12

  pre_build:
    commands:
      - echo "Running syntax validation..."
      - python -m py_compile lambda/fetch_lambda/lambda_function.py
      - python -m py_compile lambda/etl_lambda/lambda_function.py

  build:
    commands:
      - echo "Creating deployment packages..."

      - cd lambda/fetch_lambda
      - zip -r ../../fetch_lambda.zip .
      - cd ../..

      - cd lambda/etl_lambda
      - zip -r ../../etl_lambda.zip .
      - cd ../..

  post_build:
    commands:
      - echo "Deploying Fetch Lambda..."
      - aws lambda update-function-code --function-name earthquake-fetch-lambda --zip-file fileb://fetch_lambda.zip

      - echo "Deploying ETL Lambda..."
      - aws lambda update-function-code --function-name earthquake-etl-lambda --zip-file fileb://etl_lambda.zip

      - echo "Deployment completed."

artifacts:
  files:
    - fetch_lambda.zip
    - etl_lambda.zip